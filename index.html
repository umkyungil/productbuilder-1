<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello World</title>
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <div class="page">
    <header class="top">
      <div class="brand">Hello, world!</div>
      <button class="theme-toggle" type="button" data-theme-toggle aria-pressed="false">
        Dark mode
      </button>
    </header>

    <main class="content">
      <p class="eyebrow">Quick demo</p>
      <h1>Build fast. Ship clean.</h1>
      <p class="lead">
        A tiny starter that now supports both light and dark themes, with smooth transitions and a stored
        preference.
      </p>
      <div class="actions">
        <button class="cta" type="button" data-action>Press me</button>
        <p class="hint">Opens the console, nothing scary.</p>
      </div>
    </main>
  </div>
  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
